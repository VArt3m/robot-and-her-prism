<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot and her Prism</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="shell">
  <div id="toolbar">
    <button id="btn-play" class="active">PLAY</button>
    <!--
      EDIT button: editor not yet implemented.
      Placeholder kept so the layout slot exists for when it's added.
    -->
    <!-- <button id="btn-edit">EDIT</button> -->
    <div class="sep"></div>
    <!-- Text content is populated from the strings catalog (js/core/strings.js)
         so all user-facing text lives in one i18n-ready place. -->
    <span id="hint"></span>
  </div>

  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="statusbar" id="statusbar"></div>
</div>

<script type="module">
  import { App } from './js/ui/app.js';
  import { STR } from './js/core/strings.js';

  const canvas    = document.getElementById('gameCanvas');
  const statusEl  = document.getElementById('statusbar');

  // Populate static chrome text from the strings catalog (i18n-ready).
  document.title = 'Robot and her Prism';
  document.getElementById('btn-play').textContent = STR.toolbar.play;
  const mouseSVG = (side) => {
    const hx = side === 'L' ? 1 : 6;
    return `<svg width="12" height="16" viewBox="0 0 12 16" style="vertical-align:middle;display:inline-block;margin:0 1px">`
      + `<rect x=".5" y=".5" width="11" height="15" rx="3" fill="#22304e" stroke="#3d5480" stroke-width=".75"/>`
      + `<rect x="${hx}" y="1" width="5" height="5" rx="2" fill="#5088d0"/>`
      + `<line x1=".5" y1="6.5" x2="11.5" y2="6.5" stroke="#3d5480" stroke-width=".75"/>`
      + `<line x1="6" y1=".5" x2="6" y2="6.5" stroke="#3d5480" stroke-width=".75"/>`
      + `</svg>`;
  };
  document.getElementById('hint').innerHTML = STR.toolbar.hint
    .replace(/\[LMB\]/g, mouseSVG('L'))
    .replace(/\[RMB\]/g, mouseSVG('R'))
    .replace(/\[([^\]]+)\]/g, '<kbd>$1</kbd>');

  // Size the canvas's CSS box to fill the available space while preserving
  // the 1018×640 internal resolution. The canvas element itself stays at
  // 1018×640 px; the wrapping div does the centering via CSS.

  const app = new App(canvas, statusEl);
  app.start();
</script>
</body>
</html>
